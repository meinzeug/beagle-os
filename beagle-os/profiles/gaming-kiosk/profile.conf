# Beagle Endpoint OS - Gaming Kiosk Profile
#
# This profile configures an endpoint as a dedicated gaming kiosk system.
# It uses the Electron-based Beagle Gaming Kiosk application for game catalog
# discovery, launching, and streaming.
#
# Target use cases:
# - Gaming arcades and entertainment venues
# - Gaming cafes
# - Corporate gaming lounges
#
# Key packages beyond base:
# - beagle-kiosk (Electron-based kiosk app)
# - nodejs runtime (for Electron)
# - lightdm (lightweight display manager)
# - libgl1-mesa-glx (OpenGL for graphics)
#
# Boot target: graphical.target
# Auto-login: kiosk user (no interactive shell)
#
# Profile-specific systemd service:
# - beagle-gaming-kiosk.service (starts Electron kiosk after login)

PROFILE_NAME=gaming-kiosk
PROFILE_DESCRIPTION=Gaming Kiosk with Electron UI
PROFILE_VERSION="1.0"

# Additional packages for this profile (beyond base beagle-os)
# Comma-separated list
PROFILE_PACKAGES=beagle-kiosk,nodejs,lightdm,libgl1-mesa-glx,libxrender1,libxrandr2,pulseaudio,alsa-utils

# Systemd targets to enable
# Comma-separated list
PROFILE_SYSTEMD_TARGETS=graphical.target

# Systemd services to enable
# Comma-separated list
PROFILE_SYSTEMD_SERVICES=lightdm.service,beagle-gaming-kiosk.service

# Number of system slots for A/B updates
PROFILE_SYSTEM_SLOTS=2

# Default disk encryption
PROFILE_ENCRYPT_DISK=true
PROFILE_ENCRYPT_METHOD=luks2-tpm2

# Profile icon/display
PROFILE_ICON=gamepad
PROFILE_DISPLAY_ORDER=2

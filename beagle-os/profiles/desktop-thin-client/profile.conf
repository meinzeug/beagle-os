# Beagle Endpoint OS - Desktop Thin Client Profile
# 
# This profile configures an endpoint for streaming-based thin client use cases.
# It runs XFCE desktop with Moonlight client for streaming from Beagle cluster servers.
# 
# Target use cases:
# - Remote desktop streaming (Sunshine/Moonlight)
# - Office and productivity workloads
# - Development environments (remote coding)
#
# Key packages beyond base:
# - moonlight-qt (or equivalent CLI)
# - xfce4 (base desktop)
# - networkmanager
# - systemd-resolved (DNS)
#
# Boot target: graphical.target
# Auto-login: beagle user with kiosk session
#
# Profile-specific systemd service:
# - beagle-endpoint-moonlight.service (starts Moonlight fullscreen after login)

PROFILE_NAME=desktop-thin-client
PROFILE_DESCRIPTION=Desktop Thin Client with Moonlight Streaming
PROFILE_VERSION="1.0"

# Additional packages for this profile (beyond base beagle-os)
# Comma-separated list
PROFILE_PACKAGES=moonlight-qt,xfce4,xfce4-terminal,networkmanager,pulseaudio,alsa-utils

# Systemd targets to enable
# Comma-separated list
PROFILE_SYSTEMD_TARGETS=graphical.target

# Systemd services to enable
# Comma-separated list
PROFILE_SYSTEMD_SERVICES=NetworkManager.service,beagle-endpoint-moonlight.service

# Number of system slots for A/B updates
PROFILE_SYSTEM_SLOTS=2

# Default disk encryption
PROFILE_ENCRYPT_DISK=true
PROFILE_ENCRYPT_METHOD=luks2-tpm2

# Profile icon/display
PROFILE_ICON=desktop
PROFILE_DISPLAY_ORDER=1

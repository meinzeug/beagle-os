# Beagle Endpoint OS - Engineering Station Profile
#
# This profile configures an endpoint for professional engineering and creative workloads.
# It supports multi-monitor setups, Wacom tablet input, high-performance GPU passthrough,
# and professional applications (CAD, video editing, 3D rendering).
#
# Target use cases:
# - CAD/3D design workstations
# - Video editing suites
# - Audio engineering studios
# - Professional graphics/visualization
#
# Key packages beyond base:
# - xfce4 (multi-monitor capable)
# - wacom drivers (tablet support)
# - mesa-utils (GPU diagnostics)
# - x11-utils (display tools)
# - udev rules for hardware passthrough
#
# Boot target: graphical.target
# Auto-login: engineer user
#
# Profile-specific systemd services:
# - beagle-wacom-config.service (tablet device configuration)
# - beagle-gpu-passthrough-check.service (GPU availability pre-flight)

PROFILE_NAME=engineering-station
PROFILE_DESCRIPTION=Engineering Station with Multi-Monitor and GPU Support
PROFILE_VERSION="1.0"

# Additional packages for this profile (beyond base beagle-os)
# Comma-separated list
PROFILE_PACKAGES=xfce4,xfce4-terminal,xfce4-panel,libwacom-common,wacom-tools,libwacom-bin,mesa-utils,x11-utils,vulkan-tools,pciutils,udev,libgl1-mesa-glx

# Systemd targets to enable
# Comma-separated list
PROFILE_SYSTEMD_TARGETS=graphical.target

# Systemd services to enable
# Comma-separated list
PROFILE_SYSTEMD_SERVICES=NetworkManager.service,beagle-wacom-config.service,beagle-gpu-passthrough-check.service

# Number of system slots for A/B updates
PROFILE_SYSTEM_SLOTS=2

# Default disk encryption (engineering workstations often need faster disk)
PROFILE_ENCRYPT_DISK=true
PROFILE_ENCRYPT_METHOD=luks2-tpm2

# Profile icon/display
PROFILE_ICON=cog
PROFILE_DISPLAY_ORDER=3

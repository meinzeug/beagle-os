set default=0
set timeout_style=menu
set timeout=1

insmod all_video
terminal_output console
set gfxpayload=keep

menuentry 'Beagle OS Server Installer' {
  linux /live/vmlinuz boot=live components username=root hostname=beagle-server-installer console=tty0 console=ttyS0,115200n8 systemd.gpt_auto=0 systemd.unit=multi-user.target pve_server_installer=1 nomodeset consoleblank=0
  initrd /live/initrd
}

menuentry 'Beagle OS Server Installer (fail-safe mode)' {
  linux /live/vmlinuz boot=live components username=root hostname=beagle-server-installer console=tty0 console=ttyS0,115200n8 systemd.gpt_auto=0 plymouth.ignore-serial-consoles systemd.unit=multi-user.target pve_server_installer=1 nomodeset noapic consoleblank=0
  initrd /live/initrd
}

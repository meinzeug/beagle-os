name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            pytest-timeout \
            cryptography \
            aiohttp \
            requests \
            boto3

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set +e
          python -m pytest tests/unit/ \
            -q \
            --timeout=180 \
            -p no:warnings \
            2>&1 | tee /tmp/beagle-pytest.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path
          from urllib.parse import quote

          log = Path("/tmp/beagle-pytest.log").read_text(errors="replace").splitlines()
          tail = "\n".join(log[-80:])[-7000:]
          print(f"::error file=.github/workflows/tests.yml,line=43,title=pytest failed::{quote(tail)}")
          PY
            exit "$rc"
          fi

  bats:
    name: bats (shell tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats + jq + python3-yaml
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq python3-yaml

      - name: Run bats tests
        run: |
          bats --tap tests/bats/

  integration:
    name: integration (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install \
            pytest \
            cryptography \
            aiohttp \
            requests \
            boto3

      - name: Run integration tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/integration/ -q -p no:warnings

  webui-provisioning-smoke:
    name: WebUI provisioning smoke (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run provisioning UI smoke
        run: |
          mkdir -p website/core/platform
          cp core/platform/browser-common.js website/core/platform/browser-common.js
          python -m http.server 4173 --directory website >/tmp/beagle-webui-http.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "$server_pid" >/dev/null 2>&1 || true
            rm -rf website/core
          }
          trap cleanup EXIT
          curl -fsS http://127.0.0.1:4173/ >/dev/null
          python3 scripts/test-provisioning-ui-smoke.py \
            --base-url http://127.0.0.1:4173 \
            --username admin \
            --password test1234

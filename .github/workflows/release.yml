name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Optional SemVer release version, for example 8.0.1'
        required: false
        type: string

permissions:
  contents: write
  # Required for Cosign keyless signing via OIDC
  id-token: write
  # Required for maintenance actions around workflow-triggered release runs
  actions: write

jobs:
  detect-artifact-changes:
    name: Detect artifact rebuild scope
    runs-on: ubuntu-latest
    outputs:
      rebuild_server_release: ${{ steps.resolve.outputs.rebuild_server_release }}
      rebuild_thin_client: ${{ steps.resolve.outputs.rebuild_thin_client }}

    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'push' }}
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: filter
        if: ${{ github.event_name == 'push' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server_release:
              - 'server-installer/**'
              - 'beagle-host/**'
              - 'core/**'
              - 'providers/**'
              - 'website/**'
              - 'extension/**'
              - 'scripts/build-server-installer.sh'
              - 'scripts/build-server-installimage.sh'
              - 'scripts/install-beagle-host.sh'
              - 'scripts/install-beagle-host-postinstall.sh'
              - 'scripts/check-beagle-host.sh'
              - 'scripts/prepare-host-downloads.sh'
              - 'scripts/lib/**'
              - 'VERSION'
            thin_client:
              - 'thin-client-assistant/**'
              - 'beagle-os/**'
              - 'scripts/build-thin-client-installer.sh'
              - 'scripts/package.sh'
              - 'scripts/lib/**'
              - 'VERSION'

      - name: Resolve rebuild policy
        id: resolve
        run: |
          rebuild_server="true"
          rebuild_thin="true"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            rebuild_server="${{ steps.filter.outputs.server_release }}"
            rebuild_thin="${{ steps.filter.outputs.thin_client }}"
          fi
          echo "rebuild_server_release=${rebuild_server}" >> "$GITHUB_OUTPUT"
          echo "rebuild_thin_client=${rebuild_thin}" >> "$GITHUB_OUTPUT"

  build-installimage:
    name: Build server installimage tarball
    needs: [detect-artifact-changes]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          BEAGLE_RELEASE_VERSION="${{ github.event.inputs.release_version }}" \
            bash scripts/resolve-release-version.sh --write VERSION --github-output "$GITHUB_OUTPUT"

      - name: Reuse published installimage tarball
        id: reuse_installimage
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_server_release != 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/installimage
          TARBALL_NAME="${BEAGLE_SERVER_INSTALLIMAGE_TARBALL_FILENAME:-Debian-1201-bookworm-amd64-beagle-server.tar.gz}"
          gh release download "v${{ steps.version.outputs.version }}" \
            --pattern "$TARBALL_NAME" \
            --dir dist/installimage
          test -f "dist/installimage/$TARBALL_NAME"

      - name: Install build dependencies
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_server_release == 'true' || steps.reuse_installimage.outcome != 'success' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            syslinux-utils \
            rsync \
            curl \
            ca-certificates

      - name: Build installimage tarball
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_server_release == 'true' || steps.reuse_installimage.outcome != 'success' }}
        run: |
          sudo --preserve-env=BEAGLE_SERVER_INSTALLIMAGE_BUILD_DIR,BEAGLE_SERVER_INSTALLIMAGE_DIST_DIR,BEAGLE_SERVER_INSTALLIMAGE_MIN_BUILD_FREE_GIB,BEAGLE_SERVER_INSTALLIMAGE_MIN_DIST_FREE_GIB \
            bash scripts/build-server-installimage.sh
        env:
          BEAGLE_SERVER_INSTALLIMAGE_BUILD_DIR: ${{ github.workspace }}/.build/installimage
          BEAGLE_SERVER_INSTALLIMAGE_DIST_DIR: ${{ github.workspace }}/dist/installimage
          BEAGLE_SERVER_INSTALLIMAGE_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_SERVER_INSTALLIMAGE_MIN_DIST_FREE_GIB: "0"

      - name: Upload installimage artifact
        uses: actions/upload-artifact@v4
        with:
          name: installimage-dist
          path: dist/installimage/
          retention-days: 1
          if-no-files-found: error

  build-iso:
    name: Build live-build ISO
    needs: [detect-artifact-changes]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          BEAGLE_RELEASE_VERSION="${{ github.event.inputs.release_version }}" \
            bash scripts/resolve-release-version.sh --write VERSION --github-output "$GITHUB_OUTPUT"

      - name: Reuse published server installer ISO
        id: reuse_server_iso
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_server_release != 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/iso
          gh release download "v${{ steps.version.outputs.version }}" \
            --pattern "beagle-os-server-installer-amd64.iso" \
            --pattern "beagle-os-server-installer.iso" \
            --dir dist/iso
          test -f dist/iso/beagle-os-server-installer-amd64.iso
          test -f dist/iso/beagle-os-server-installer.iso

      - name: Install build dependencies
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_server_release == 'true' || steps.reuse_server_iso.outcome != 'success' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            syslinux-utils \
            rsync \
            curl \
            ca-certificates

      - name: Build server installer ISO
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_server_release == 'true' || steps.reuse_server_iso.outcome != 'success' }}
        run: |
          sudo --preserve-env=SERVER_INSTALLER_BUILD_DIR,SERVER_INSTALLER_DIST_DIR,BEAGLE_SERVER_INSTALLER_MIN_BUILD_FREE_GIB,BEAGLE_SERVER_INSTALLER_MIN_DIST_FREE_GIB \
            bash scripts/build-server-installer.sh
        env:
          SERVER_INSTALLER_BUILD_DIR: ${{ github.workspace }}/.build/iso
          SERVER_INSTALLER_DIST_DIR: ${{ github.workspace }}/dist/iso
          BEAGLE_SERVER_INSTALLER_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_SERVER_INSTALLER_MIN_DIST_FREE_GIB: "0"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: iso-dist
          path: dist/iso/
          retention-days: 1
          if-no-files-found: error

  build-thin-client:
    name: Build thin-client installer
    needs: [detect-artifact-changes]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          BEAGLE_RELEASE_VERSION="${{ github.event.inputs.release_version }}" \
            bash scripts/resolve-release-version.sh --write VERSION --github-output "$GITHUB_OUTPUT"

      - name: Reuse published thin-client installer ISO
        id: reuse_thin_client
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_thin_client != 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/thin-client/live
          gh release download "v${{ steps.version.outputs.version }}" \
            --pattern "beagle-os-installer-amd64.iso" \
            --pattern "beagle-os-installer.iso" \
            --dir dist/thin-client
          test -f dist/thin-client/beagle-os-installer-amd64.iso
          if [[ ! -f dist/thin-client/beagle-os-installer.iso ]]; then
            install -m 0644 dist/thin-client/beagle-os-installer-amd64.iso dist/thin-client/beagle-os-installer.iso
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            rsync \
            curl \
            ca-certificates

      - name: Extract live filesystem from published ISO
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_thin_client != 'true' && steps.reuse_thin_client.outcome == 'success' }}
        run: |
          xorriso -osirrox on -indev dist/thin-client/beagle-os-installer-amd64.iso \
            -extract /live/vmlinuz dist/thin-client/live/vmlinuz \
            -extract /live/initrd.img dist/thin-client/live/initrd.img \
            -extract /live/filesystem.squashfs dist/thin-client/live/filesystem.squashfs \
            -extract /live/SHA256SUMS dist/thin-client/live/SHA256SUMS \
            >/dev/null 2>&1
          test -f dist/thin-client/live/filesystem.squashfs

      - name: Build thin-client installer
        if: ${{ needs.detect-artifact-changes.outputs.rebuild_thin_client == 'true' || steps.reuse_thin_client.outcome != 'success' }}
        run: |
          sudo --preserve-env=THINCLIENT_BUILD_DIR,THINCLIENT_DIST_DIR,BEAGLE_THINCLIENT_MIN_BUILD_FREE_GIB,BEAGLE_THINCLIENT_MIN_DIST_FREE_GIB \
            bash scripts/build-thin-client-installer.sh
        env:
          THINCLIENT_BUILD_DIR: ${{ github.workspace }}/.build/thin-client
          THINCLIENT_DIST_DIR: ${{ github.workspace }}/dist/thin-client
          BEAGLE_THINCLIENT_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_THINCLIENT_MIN_DIST_FREE_GIB: "0"

      - name: Upload thin-client artifact
        uses: actions/upload-artifact@v4
        with:
          name: thin-client-dist
          path: dist/thin-client/
          retention-days: 1
          if-no-files-found: error

  sbom:
    name: Generate SBOM for release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve VERSION
        run: |
          BEAGLE_RELEASE_VERSION="${{ github.event.inputs.release_version }}" \
            bash scripts/resolve-release-version.sh --write VERSION

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CycloneDX generators
        run: |
          pip install cyclonedx-bom
          npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate Python SBOM
        run: |
          mkdir -p dist/sbom
          if [[ -f requirements.txt ]]; then
            cyclonedx-py requirements requirements.txt \
              -o dist/sbom/sbom-python.cdx.json || true
          else
            cyclonedx-py environment \
              -o dist/sbom/sbom-python.cdx.json || true
          fi

      - name: Generate Node SBOMs
        run: |
          if [[ -f extension/package.json ]]; then
            (cd extension && cyclonedx-npm \
              --output-format JSON \
              --output-file ../dist/sbom/sbom-extension.cdx.json) || true
          fi
          if [[ -f beagle-kiosk/package.json ]]; then
            (cd beagle-kiosk && cyclonedx-npm \
              --output-format JSON \
              --output-file ../dist/sbom/sbom-kiosk.cdx.json) || true
          fi

      - name: Generate SHA256SUMS for SBOM bundle
        run: |
          if compgen -G "dist/sbom/*.json" > /dev/null; then
            (cd dist/sbom && sha256sum *.json > SHA256SUMS) || true
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-sbom
          path: dist/sbom/
          retention-days: 1
          if-no-files-found: warn

  assemble-release-package:
    name: Assemble public release package
    needs: [build-installimage, build-iso, build-thin-client]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve VERSION
        id: version
        run: |
          BEAGLE_RELEASE_VERSION="${{ github.event.inputs.release_version }}" \
            bash scripts/resolve-release-version.sh --write VERSION --github-output "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install packaging dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            zip \
            rsync \
            curl \
            ca-certificates \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            debootstrap \
            live-build

      - name: Download installimage artifacts
        uses: actions/download-artifact@v4
        with:
          name: installimage-dist
          path: dist/installimage/

      - name: Download ISO artifacts
        uses: actions/download-artifact@v4
        with:
          name: iso-dist
          path: dist/iso/

      - name: Download thin-client artifacts
        uses: actions/download-artifact@v4
        with:
          name: thin-client-dist
          path: dist/thin-client/

      - name: Assemble release dist
        run: |
          INSTALLER_BUILD_DIR="${{ github.workspace }}/dist/thin-client" \
          SERVER_INSTALLER_DIST_DIR="${{ github.workspace }}/dist/iso" \
          SERVER_INSTALLIMAGE_DIST_DIR="${{ github.workspace }}/dist/installimage" \
          SKIP_THIN_CLIENT_BUILD=1 \
          SKIP_SERVER_INSTALLER_BUILD=1 \
          SKIP_SERVER_INSTALLIMAGE_BUILD=1 \
          BUILD_BEAGLE_OS=0 \
          bash scripts/package.sh

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-package-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [assemble-release-package, sbom]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: |
          BEAGLE_RELEASE_VERSION="${{ needs.assemble-release-package.outputs.version }}" \
            bash scripts/resolve-release-version.sh --write VERSION --github-output "$GITHUB_OUTPUT"

      - name: Download release package artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-dist
          path: dist/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-sbom
          path: dist/sbom/

      - name: Generate SHA256SUMS
        run: |
          find dist -maxdepth 1 -type f ! -name 'SHA256SUMS*' ! -name 'RELEASE_ASSETS.md' | sort | xargs sha256sum > dist/SHA256SUMS
          if compgen -G "dist/sbom/*.json" > /dev/null; then
            (cd dist/sbom && sha256sum *.json > SHA256SUMS)
          fi
          cat dist/SHA256SUMS

      - name: Import GPG key (optional)
        env:
          BEAGLE_RELEASE_GPG_KEY: ${{ secrets.BEAGLE_RELEASE_GPG_KEY }}
        run: |
          if [[ -n "${BEAGLE_RELEASE_GPG_KEY:-}" ]]; then
            echo "$BEAGLE_RELEASE_GPG_KEY" | gpg --batch --import
            gpg --armor --detach-sign --output dist/SHA256SUMS.sig dist/SHA256SUMS
          else
            echo "No BEAGLE_RELEASE_GPG_KEY configured - skipping GPG signature"
          fi

      - name: Sign SHA256SUMS with Cosign (keyless / sigstore)
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Cosign sign
        continue-on-error: true
        run: |
          # Keyless signing — requires id-token: write permission
          # Signs the SHA256SUMS file and produces a .bundle sidecar
          if command -v cosign &>/dev/null; then
            cosign sign-blob \
              --yes \
              --bundle dist/SHA256SUMS.cosign.bundle \
              dist/SHA256SUMS || true
          else
            echo "cosign not available — skipping keyless signature"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF_TYPE="${{ github.ref_type }}"
          REF_NAME="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_TAG="v${VERSION}"
          if [[ "$REF_TYPE" == "tag" ]]; then
            TAG="$REF_NAME"
            if [[ "$TAG" != "$VERSION_TAG" ]]; then
              echo "Tag $TAG does not match VERSION $VERSION_TAG" >&2
              exit 1
            fi
          else
            TAG="$VERSION_TAG"
            git tag -f "$TAG" "${{ github.sha }}"
            git push --force origin "refs/tags/$TAG"
          fi
          RELEASE_TITLE="Beagle OS ${VERSION}"

          # Collect all release assets
          assets=()
          while IFS= read -r -d '' f; do
            assets+=("$f")
          done < <(find dist -maxdepth 1 -type f ! -name 'SHA256SUMS*' ! -name 'RELEASE_ASSETS.md' -print0 | sort -z)
          assets+=("dist/SHA256SUMS")
          [[ -f dist/SHA256SUMS.sig ]] && assets+=("dist/SHA256SUMS.sig")
          [[ -f dist/SHA256SUMS.cosign.bundle ]] && assets+=("dist/SHA256SUMS.cosign.bundle")
          # Bundle SBOM files
          while IFS= read -r -d '' f; do
            assets+=("$f")
          done < <(find dist/sbom/ -type f ! -name 'SHA256SUMS' -print0 | sort -z)

          # GitHub Release assets have a hard per-file size limit. Keep the
          # release green and publish a manifest for files that must stay as
          # workflow artifacts or be mirrored by external hosting.
          max_release_asset_bytes=$((2 * 1024 * 1024 * 1024 - 1))
          manifest="dist/RELEASE_ASSETS.md"
          filtered_assets=()
          skipped_assets=()
          {
            echo "# Beagle OS release assets"
            echo
            echo "Per-file release asset limit: ${max_release_asset_bytes} bytes."
            echo
            echo "## Included"
          } > "$manifest"
          for asset in "${assets[@]}"; do
            size=$(stat -c '%s' "$asset")
            if (( size <= max_release_asset_bytes )); then
              filtered_assets+=("$asset")
              printf -- '- `%s` (%s bytes)\n' "$asset" "$size" >> "$manifest"
            else
              skipped_assets+=("$asset:$size")
            fi
          done
          {
            echo
            echo "## Skipped"
          } >> "$manifest"
          if (( ${#skipped_assets[@]} )); then
            for item in "${skipped_assets[@]}"; do
              path="${item%:*}"
              size="${item##*:}"
              printf -- '- `%s` (%s bytes): exceeds GitHub Release per-file limit; available as workflow artifact.\n' "$path" "$size" >> "$manifest"
            done
          else
            echo "- none" >> "$manifest"
          fi
          filtered_assets+=("$manifest")
          assets=("${filtered_assets[@]}")

          # Extract changelog section for this version if CHANGELOG.md exists
          notes_args=()
          if [[ -f CHANGELOG.md ]]; then
            notes_args+=(--notes-file CHANGELOG.md)
          else
            notes_args+=(--generate-notes)
          fi

          set +e
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" --clobber "${assets[@]}" 2>&1 | tee /tmp/beagle-release-create.log
            rc=${PIPESTATUS[0]}
            if [ "$rc" -eq 0 ]; then
              gh release edit "$TAG" \
                --title "$RELEASE_TITLE" \
                --latest \
                "${notes_args[@]}" 2>&1 | tee -a /tmp/beagle-release-create.log
              rc=${PIPESTATUS[0]}
            fi
          else
            gh release create "$TAG" \
              --title "$RELEASE_TITLE" \
              --latest \
              "${notes_args[@]}" \
              "${assets[@]}" 2>&1 | tee /tmp/beagle-release-create.log
            rc=${PIPESTATUS[0]}
          fi
          if [ "$rc" -ne 0 ]; then
            python - <<'PY'
          from pathlib import Path
          from urllib.parse import quote

          log = Path("/tmp/beagle-release-create.log").read_text(errors="replace").splitlines()
          tail = "\n".join(log[-80:])[-7000:]
          print(f"::error file=.github/workflows/release.yml,line=275,title=gh release create failed::{quote(tail)}")
          PY
            exit "$rc"
          fi

  deploy-public-artifacts:
    name: Deploy public artifacts to beagle-os.com
    if: github.ref_type == 'tag' || github.ref == 'refs/heads/main'
    needs: [create-release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve VERSION
        run: |
          BEAGLE_RELEASE_VERSION="${{ needs.create-release.outputs.version }}" \
            bash scripts/resolve-release-version.sh --write VERSION

      - name: Download release package artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-package-dist
          path: dist/

      - name: Setup SSH
        env:
          BEAGLE_PUBLIC_DEPLOY_SSH_KEY: ${{ secrets.BEAGLE_PUBLIC_DEPLOY_SSH_KEY }}
          BEAGLE_PUBLIC_DEPLOY_KNOWN_HOSTS: ${{ secrets.BEAGLE_PUBLIC_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$BEAGLE_PUBLIC_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$BEAGLE_PUBLIC_DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0644 ~/.ssh/known_hosts

      - name: Install rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rsync openssh-client

      - name: Publish public artifacts
        env:
          BEAGLE_PUBLIC_UPDATE_TARGET: ${{ secrets.BEAGLE_PUBLIC_UPDATE_TARGET }}
        run: bash scripts/publish-public-update-artifacts.sh

      - name: Verify public update mirror
        run: |
          VERSION="$(tr -d ' \n\r' < VERSION)"
          curl -fsSL https://beagle-os.com/beagle-updates/beagle-downloads-status.json >/tmp/beagle-downloads-status.json
          python3 - "$VERSION" <<'PY'
          import json
          import sys
          from pathlib import Path

          expected_version = sys.argv[1]
          data = json.loads(Path('/tmp/beagle-downloads-status.json').read_text())
          if data.get('version') != expected_version:
              raise SystemExit(f"expected public mirror version {expected_version}, got {data.get('version')!r}")
          for key in ('payload_url', 'bootstrap_url'):
              value = str(data.get(key) or '')
              if expected_version not in value:
                  raise SystemExit(f"expected {key} to point at {expected_version} artifacts, got {value!r}")
          PY

      - name: Checkout public website repository
        uses: actions/checkout@v4
        with:
          repository: meinzeug/beagle-os.com
          path: beagle-os.com
          token: ${{ secrets.BEAGLE_PUBLIC_WEBSITE_REPO_TOKEN || secrets.COPILOT_ASSIGNMENT_TOKEN || github.token }}

      - name: Publish public website
        env:
          BEAGLE_PUBLIC_SITE_DIR: ${{ github.workspace }}/beagle-os.com
          BEAGLE_PUBLIC_SITE_TARGET: ${{ secrets.BEAGLE_PUBLIC_SITE_TARGET }}
        run: bash scripts/deploy-public-website.sh

      - name: Verify live website content
        run: |
          VERSION="$(tr -d ' \n\r' < VERSION)"
          RELEASE_TAG="v${VERSION}"
          curl -fsSL https://beagle-os.com/ >/tmp/beagle-homepage.html
          curl -fsSL https://beagle-os.com/download/ >/tmp/beagle-download.html
          curl -fsSL https://beagle-os.com/styles.css >/tmp/beagle-styles.css
          curl -fsSI https://beagle-os.com/assets/img/beagleos-gaming.png >/tmp/beagle-wallpaper.headers
          grep -q "Release ${RELEASE_TAG}" /tmp/beagle-homepage.html
          grep -q "Current release: ${RELEASE_TAG}" /tmp/beagle-download.html
          grep -qi 'beagleos-gaming.png' /tmp/beagle-styles.css

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # Required for Cosign keyless signing via OIDC
  id-token: write

jobs:
  build-installimage:
    name: Build server installimage tarball
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            syslinux-utils \
            rsync \
            curl \
            ca-certificates

      - name: Build installimage tarball
        run: sudo bash scripts/build-server-installimage.sh
        env:
          BEAGLE_SERVER_INSTALLIMAGE_BUILD_DIR: ${{ github.workspace }}/.build/installimage
          BEAGLE_SERVER_INSTALLIMAGE_DIST_DIR: ${{ github.workspace }}/dist/installimage
          BEAGLE_SERVER_INSTALLIMAGE_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_SERVER_INSTALLIMAGE_MIN_DIST_FREE_GIB: "0"

      - name: Upload installimage artifact
        uses: actions/upload-artifact@v4
        with:
          name: installimage-dist
          path: dist/installimage/
          retention-days: 1

  build-iso:
    name: Build live-build ISO
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            syslinux-utils \
            rsync \
            curl \
            ca-certificates

      - name: Build server installer ISO
        run: sudo bash scripts/build-server-installer.sh
        env:
          SERVER_INSTALLER_BUILD_DIR: ${{ github.workspace }}/.build/iso
          SERVER_INSTALLER_DIST_DIR: ${{ github.workspace }}/dist/iso
          BEAGLE_SERVER_INSTALLER_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_SERVER_INSTALLER_MIN_DIST_FREE_GIB: "0"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: iso-dist
          path: dist/iso/
          retention-days: 1

  sbom:
    name: Generate SBOM for release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CycloneDX generators
        run: |
          pip install cyclonedx-bom
          npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate Python SBOM
        run: |
          mkdir -p dist/sbom
          if [[ -f requirements.txt ]]; then
            cyclonedx-py requirements requirements.txt \
              -o dist/sbom/sbom-python.cdx.json || true
          else
            cyclonedx-py environment \
              -o dist/sbom/sbom-python.cdx.json || true
          fi

      - name: Generate Node SBOMs
        run: |
          if [[ -f extension/package.json ]]; then
            (cd extension && cyclonedx-npm \
              --output-format JSON \
              --output-file ../dist/sbom/sbom-extension.cdx.json) || true
          fi
          if [[ -f beagle-kiosk/package.json ]]; then
            (cd beagle-kiosk && cyclonedx-npm \
              --output-format JSON \
              --output-file ../dist/sbom/sbom-kiosk.cdx.json) || true
          fi

      - name: Generate SHA256SUMS for SBOM bundle
        run: |
          if compgen -G "dist/sbom/*.json" > /dev/null; then
            (cd dist/sbom && sha256sum *.json > SHA256SUMS) || true
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-sbom
          path: dist/sbom/
          retention-days: 1
          if-no-files-found: warn

  create-release:
    name: Create GitHub Release
    needs: [build-installimage, build-iso, sbom]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download installimage artifacts
        uses: actions/download-artifact@v4
        with:
          name: installimage-dist
          path: dist/installimage/

      - name: Download ISO artifacts
        uses: actions/download-artifact@v4
        with:
          name: iso-dist
          path: dist/iso/

      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-sbom
          path: dist/sbom/

      - name: Generate SHA256SUMS
        run: |
          mkdir -p dist
          find dist/installimage/ dist/iso/ dist/sbom/ -type f ! -name 'SHA256SUMS*' | sort | xargs sha256sum > dist/SHA256SUMS
          cat dist/SHA256SUMS

      - name: Import GPG key (optional)
        if: ${{ secrets.BEAGLE_RELEASE_GPG_KEY != '' }}
        run: |
          echo "${{ secrets.BEAGLE_RELEASE_GPG_KEY }}" | gpg --batch --import
          gpg --armor --detach-sign --output dist/SHA256SUMS.sig dist/SHA256SUMS

      - name: Sign SHA256SUMS with Cosign (keyless / sigstore)
        uses: sigstore/cosign-installer@v3
        continue-on-error: true

      - name: Cosign sign
        continue-on-error: true
        run: |
          # Keyless signing — requires id-token: write permission
          # Signs the SHA256SUMS file and produces a .bundle sidecar
          if command -v cosign &>/dev/null; then
            cosign sign-blob \
              --yes \
              --bundle dist/SHA256SUMS.cosign.bundle \
              dist/SHA256SUMS || true
          else
            echo "cosign not available — skipping keyless signature"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Collect all release assets
          assets=()
          while IFS= read -r -d '' f; do
            assets+=("$f")
          done < <(find dist/installimage/ dist/iso/ -type f -print0 | sort -z)
          assets+=("dist/SHA256SUMS")
          [[ -f dist/SHA256SUMS.sig ]] && assets+=("dist/SHA256SUMS.sig")
          [[ -f dist/SHA256SUMS.cosign.bundle ]] && assets+=("dist/SHA256SUMS.cosign.bundle")
          # Bundle SBOM files
          while IFS= read -r -d '' f; do
            assets+=("$f")
          done < <(find dist/sbom/ -type f -print0 | sort -z)

          # Extract changelog section for this version if CHANGELOG.md exists
          notes_args=()
          if [[ -f CHANGELOG.md ]]; then
            notes_args+=(--notes-file CHANGELOG.md)
          else
            notes_args+=(--generate-notes)
          fi

          gh release create "$TAG" \
            --title "Beagle OS $VERSION" \
            "${notes_args[@]}" \
            "${assets[@]}"

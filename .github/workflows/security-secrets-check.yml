name: security-secrets-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 1 * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/security-secrets-check.sh'
      - '.gitignore'
      - '.security-secrets-allowlist'
      - '.github/workflows/security-secrets-check.yml'

jobs:
  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run secrets hygiene checks
        run: ./scripts/security-secrets-check.sh

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-check-report
          path: dist/security-audit/secrets-check.txt

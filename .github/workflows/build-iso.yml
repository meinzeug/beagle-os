name: build-iso

on:
  push:
    branches: [main]
    paths:
      - 'server-installer/**'
      - 'beagle-host/**'
      - 'scripts/build-server-installer.sh'
      - 'scripts/build-server-installimage.sh'
      - 'VERSION'
  schedule:
    # Daily at 03:17 UTC — nightly reproducibility check
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which build target to run'
        required: false
        default: 'installimage'
        type: choice
        options:
          - installimage
          - iso
          - both

jobs:
  build-installimage:
    name: Build server installimage tarball
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.build_target == 'installimage' || github.event.inputs.build_target == 'both') ||
      github.event_name == 'push' ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            syslinux-utils \
            rsync \
            curl \
            ca-certificates

      - name: Build installimage tarball
        run: sudo bash scripts/build-server-installimage.sh
        env:
          BEAGLE_SERVER_INSTALLIMAGE_BUILD_DIR: ${{ github.workspace }}/.build/installimage
          BEAGLE_SERVER_INSTALLIMAGE_DIST_DIR: ${{ github.workspace }}/dist/installimage
          BEAGLE_SERVER_INSTALLIMAGE_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_SERVER_INSTALLIMAGE_MIN_DIST_FREE_GIB: "0"

      - name: Upload installimage artifact
        uses: actions/upload-artifact@v4
        with:
          name: beagle-server-installimage-${{ steps.version.outputs.version }}
          path: dist/installimage/
          retention-days: 30

  build-iso:
    name: Build live-build ISO
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.build_target == 'iso' || github.event.inputs.build_target == 'both')

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            syslinux-utils \
            rsync \
            curl \
            ca-certificates

      - name: Build server installer ISO
        run: sudo bash scripts/build-server-installer.sh
        env:
          SERVER_INSTALLER_BUILD_DIR: ${{ github.workspace }}/.build/iso
          SERVER_INSTALLER_DIST_DIR: ${{ github.workspace }}/dist/iso
          BEAGLE_SERVER_INSTALLER_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_SERVER_INSTALLER_MIN_DIST_FREE_GIB: "0"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: beagle-server-installer-${{ steps.version.outputs.version }}
          path: dist/iso/
          retention-days: 30

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    # Independent of installimage/iso jobs — runs on every trigger to track
    # supply-chain composition over time. Cheap (no debootstrap).
    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CycloneDX generators
        run: |
          pip install cyclonedx-bom
          npm install -g @cyclonedx/cyclonedx-npm

      - name: Generate Python SBOM
        run: |
          mkdir -p dist/sbom
          # Repo has no requirements.txt — synthesize one from imports of
          # pinned tooling so the SBOM at least documents declared deps.
          # Falls back to environment if requirements file is missing.
          if [[ -f requirements.txt ]]; then
            cyclonedx-py requirements requirements.txt \
              -o dist/sbom/sbom-python.cdx.json || true
          else
            cyclonedx-py environment \
              -o dist/sbom/sbom-python.cdx.json || true
          fi
          ls -la dist/sbom/ || true

      - name: Generate Node SBOM (extension/)
        run: |
          if [[ -f extension/package.json ]]; then
            (cd extension && cyclonedx-npm \
              --output-format JSON \
              --output-file ../dist/sbom/sbom-extension.cdx.json) || true
          fi
          if [[ -f beagle-kiosk/package.json ]]; then
            (cd beagle-kiosk && cyclonedx-npm \
              --output-format JSON \
              --output-file ../dist/sbom/sbom-kiosk.cdx.json) || true
          fi
          ls -la dist/sbom/ || true

      - name: Generate SHA256SUMS for SBOM bundle
        run: |
          if compgen -G "dist/sbom/*.json" > /dev/null; then
            (cd dist/sbom && sha256sum *.json > SHA256SUMS) || true
            cat dist/sbom/SHA256SUMS || true
          fi

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beagle-sbom-${{ steps.version.outputs.version }}
          path: dist/sbom/
          retention-days: 90
          if-no-files-found: warn

  build-thin-client:
    name: Build thin-client installer
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            squashfs-tools \
            xorriso \
            grub2-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            dosfstools \
            mtools \
            rsync \
            ca-certificates

      - name: Build thin-client installer
        run: sudo bash scripts/build-thin-client-installer.sh
        env:
          THIN_CLIENT_BUILD_DIR: ${{ github.workspace }}/.build/thin-client
          THIN_CLIENT_DIST_DIR: ${{ github.workspace }}/dist/thin-client
          BEAGLE_THIN_CLIENT_MIN_BUILD_FREE_GIB: "0"
          BEAGLE_THIN_CLIENT_MIN_DIST_FREE_GIB: "0"

      - name: Compute SHA256 for thin-client artifacts
        id: sha256
        run: |
          if compgen -G "dist/thin-client/*" > /dev/null; then
            (cd dist/thin-client && sha256sum * > SHA256SUMS) || true
            echo "sha256=$(cat dist/thin-client/SHA256SUMS | head -1 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload thin-client artifact
        uses: actions/upload-artifact@v4
        with:
          name: beagle-thin-client-${{ steps.version.outputs.version }}
          path: dist/thin-client/
          retention-days: 30
          if-no-files-found: warn

  reproducibility-check:
    name: SHA256 reproducibility check (installimage)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: build-installimage

    steps:
      - uses: actions/checkout@v4

      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d ' \n\r' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Download today's build artifact
        uses: actions/download-artifact@v4
        with:
          name: beagle-server-installimage-${{ steps.version.outputs.version }}
          path: dist/today/

      - name: Compute today's SHA256SUMS
        id: today
        run: |
          mkdir -p dist/check
          if compgen -G "dist/today/*" > /dev/null; then
            (cd dist/today && find . -type f ! -name 'SHA256SUMS' | sort | xargs sha256sum > ../check/SHA256SUMS.today)
            cat dist/check/SHA256SUMS.today
          else
            echo "No artifacts found"
            exit 1
          fi

      - name: Download previous build artifact (if exists)
        id: prev
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-iso.yml
          event: schedule
          name_is_regexp: true
          name: beagle-server-installimage-.*
          path: dist/previous/
          skip_unpack: false

      - name: Compare SHA256SUMS (warn-only)
        if: steps.prev.outcome == 'success'
        run: |
          mkdir -p dist/check
          if compgen -G "dist/previous/**/*" > /dev/null; then
            find dist/previous -type f ! -name 'SHA256SUMS' | sort | \
              xargs -I{} sh -c 'echo "$(sha256sum {} | awk "{print \$1}") $(basename {})"' | \
              sort > dist/check/SHA256SUMS.previous

            echo "=== Today ==="
            cat dist/check/SHA256SUMS.today
            echo ""
            echo "=== Previous ==="
            cat dist/check/SHA256SUMS.previous
            echo ""

            if diff -u dist/check/SHA256SUMS.previous dist/check/SHA256SUMS.today; then
              echo "✓ Builds are reproducible — SHA256 checksums match."
            else
              echo "⚠ SHA256 mismatch detected. Non-reproducible build (warn-only)."
              # Do NOT fail — non-reproducibility is a warning, not a hard blocker
            fi
          else
            echo "No previous artifacts to compare against (first nightly run)."
          fi

      - name: Upload reproducibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-check-${{ github.run_id }}
          path: dist/check/
          retention-days: 14
          if-no-files-found: ignore

name: public-website

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'public-site/**'
      - 'scripts/deploy-public-website.sh'
      - 'scripts/render-site-templates.py'
      - 'VERSION'
      - '.github/workflows/public-website.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-public-website:
    name: Deploy beagle-os.com website
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          BEAGLE_PUBLIC_DEPLOY_SSH_KEY: ${{ secrets.BEAGLE_PUBLIC_DEPLOY_SSH_KEY }}
          BEAGLE_PUBLIC_DEPLOY_KNOWN_HOSTS: ${{ secrets.BEAGLE_PUBLIC_DEPLOY_KNOWN_HOSTS }}
        run: |
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$BEAGLE_PUBLIC_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          printf '%s\n' "$BEAGLE_PUBLIC_DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0644 ~/.ssh/known_hosts

      - name: Install rsync
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rsync openssh-client

      - name: Publish website
        env:
          BEAGLE_PUBLIC_SITE_TARGET: ${{ secrets.BEAGLE_PUBLIC_SITE_TARGET }}
        run: bash scripts/deploy-public-website.sh

      - name: Verify rendered website content
        run: |
          VERSION="$(tr -d ' \n\r' < VERSION)"
          RELEASE_TAG="v${VERSION}"
          GITHUB_RELEASE_URL="https://github.com/meinzeug/beagle-os/releases/tag/${RELEASE_TAG}"
          PUBLIC_UPDATE_BASE_URL="https://beagle-os.com/beagle-updates"
          render_dir="$(mktemp -d)"
          trap 'rm -rf "${render_dir}"' EXIT
          rsync -a --delete public-site/ "${render_dir}/"
          python3 scripts/render-site-templates.py \
            "${render_dir}" "${RELEASE_TAG}" "${GITHUB_RELEASE_URL}" "${PUBLIC_UPDATE_BASE_URL}"
          grep -q 'Standalone virtualization' "${render_dir}/index.html"
          grep -q "Release ${RELEASE_TAG}" "${render_dir}/index.html"
          grep -q "Current release: ${RELEASE_TAG}" "${render_dir}/download/index.html"
          grep -q "${RELEASE_TAG}" "${render_dir}/download/index.html"
          if grep -qi 'Proxmox optional' "${render_dir}/index.html"; then
            echo "Rendered homepage still contains legacy Proxmox copy" >&2
            exit 1
          fi

name: GoFuture Complete Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  gofuture-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Fail if docs/gofuture has open [ ] items
        run: bash scripts/check-gofuture-complete.sh
